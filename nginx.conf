server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hardening: don't advertise the nginx version, and set standard headers.
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Single-page app: serve index.html for any route that isn't a real file,
    # so client-side routing (vue-router) works on deep links / refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed build assets aggressively; they get new names on rebuild.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
